<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dash Akol - Charlie Anthony Mejia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #111;
            color: #fff;
            font-family: 'Roboto', sans-serif;
        }

        /* Top Navigation Header */
        header {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo-text {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: #fffde6;
            text-transform: uppercase;
            text-decoration: none;
        }
        nav a {
            color: #fffde6;
            text-decoration: none;
            margin-left: 20px;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 1px;
            transition: color 0.3s;
        }
        nav a:hover { color: #d6336c; }

        /* Big Widescreen Show Banner at Top */
        .show-hero {
            width: 100%;
            height: 400px; 
            position: relative;
            overflow: hidden;
        }
        .show-hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center center;
        }
        .show-hero .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, #111 0%, rgba(17,17,17,0.4) 70%, rgba(0,0,0,0.2) 100%);
        }

        /* Main Content Section */
        .content-container {
            max-width: 1200px;
            margin: -50px auto 100px auto; 
            padding: 0 20px;
            position: relative;
            z-index: 2;
        }
        .back-link {
            display: inline-block;
            color: #d6336c;
            text-decoration: none;
            font-weight: 700;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
        }
        .back-link:hover { text-decoration: underline; }

        h1 {
            font-size: 3rem;
            color: #fffde6;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 5px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.7);
        }
        .company-sub {
            font-size: 1.3rem;
            color: #ccc;
            margin-bottom: 40px;
        }

        /* Production Gallery Layout */
        .gallery-section {
            margin-top: 40px;
        }
        .gallery-section h3 {
            color: #fffde6;
            font-size: 1.5rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        .gallery-item {
            position: relative;
            height: 240px;
            overflow: hidden;
            border-radius: 6px;
            border: 1px solid rgba(255, 253, 230, 0.05);
            background-color: #1a1a1a;
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s;
        }
        .gallery-item:hover img {
            transform: scale(1.03);
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo-text">Charlie Anthony Mejia</a>
        <nav>
            <a href="portfolio.html">Portfolio</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <div class="show-hero">
        <img src="dashakol/dashakol%20(1).png" alt="Dash Akol Hero">
        <div class="overlay"></div>
    </div>

    <div class="content-container">
        <a href="portfolio.html" class="back-link">← Back to Portfolio</a>
        
        <h1>Dash Akol: According to Marjan (Part 1)</h1>
        <p class="company-sub">Hamid and Christina Moghadam Program in Iranian Studies</p>

        <div class="gallery-section">
            <h3>Production Gallery</h3>
            <div class="image-grid" id="production-gallery">
                </div>
        </div>
    </div>

    <script>
        const galleryContainer = document.getElementById('production-gallery');
        const totalImages = 7;

        // Automatically loops from dashakol (1).png up to dashakol (7).png
        for (let i = 1; i <= totalImages; i++) {
            const rawFilename = `dashakol (${i}).png`;
            // Encodes the space safely for browser routing
            const safePath = `dashakol/${encodeURIComponent(rawFilename)}`;

            const item = document.createElement('div');
            item.className = 'gallery-item';
            item.innerHTML = `<img src="${safePath}" alt="Dash Akol Production Shot ${i}" loading="lazy">`;
            
            galleryContainer.appendChild(item);
        }
    </script>

</body>
</html>
