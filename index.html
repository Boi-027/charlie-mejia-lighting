<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charlie Anthony Mejia Lighting Design</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            height: 100%;
            font-family: 'Roboto', sans-serif;
            overflow: hidden;
            background-color: #000;
        }

        /* Full-screen slideshow container */
        .slideshow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Individual slide images */
        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        .slide.active {
            opacity: 1;
        }

        /* Centering overlay banner (Transparent) */
        .banner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            background-color: transparent;
            padding: 20px;
            text-align: center;
            width: 100%;
            max-width: 1200px; /* Prevents text from hitting absolute screen edge */
        }

        .banner h1 {
            font-size: 3.2vw; /* Scales smoothly relative to window width */
            min-font-size: 24px; /* Fallback baseline */
            font-weight: 700;
            letter-spacing: 3px;
            color: #fffde6;
            margin-bottom: 20px;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.8);
            line-height: 1.3;
        }

        .banner nav {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px 40px; /* Flexible item spacing across screen wrapping */
        }

        .banner nav a {
            text-decoration: none;
            color: #fffde6;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 2px;
            transition: color 0.3s;
            text-shadow: 1px 1px 5px rgba(0, 0, 0, 0.8);
        }

        .banner nav a:hover {
            color: #d6336c;
        }

        /* Mobile Breakpoint Optimization */
        @media (max-width: 768px) {
            .banner {
                padding: 15px;
            }
            .banner h1 {
                font-size: 1.6rem; /* Lock down clean text sizing for mobile layouts */
                letter-spacing: 1.5px;
                margin-bottom: 25px;
            }
            .banner nav a {
                font-size: 1rem;
                letter-spacing: 1px;
            }
        }
    </style>
</head>
<body>

    <div class="slideshow">
        <img src="https://lh3.googleusercontent.com/u/0/d/10HAjxLVtvOJFLe7pKiUL4nfSv4qMsT0O" class="slide active">
        <img src="https://lh3.googleusercontent.com/u/0/d/1pbyO7upesF9vk3e6aSUuAE_U6lK0fff6" class="slide">
        <img src="https://lh3.googleusercontent.com/u/0/d/1V0ndiCMSeoHj7i0A8lwvshe4noPjYnb8" class="slide">
        <img src="https://lh3.googleusercontent.com/u/0/d/1e5atv0gVhnggnb88GhfNE12Ft_dw5fs4" class="slide">
        <img src="https://lh3.googleusercontent.com/u/0/d/1Uffy3MlfmWsbOpunBa9BQ0LP6pPp1FIQ" class="slide">
        <img src="https://lh3.googleusercontent.com/u/0/d/1bTW0gOIjYPTEMVTOJROZv6300OCF6ZRl" class="slide">
        <img src="https://lh3.googleusercontent.com/u/0/d/1u_BgE_goMVSbX1QOg7E3tQyjrbcRRuzR" class="slide">
        <img src="https://lh3.googleusercontent.com/u/0/d/11CFsv6vW9H-vfGI0OCJwvWAnF7gfV9wc" class="slide">
        <img src="https://lh3.googleusercontent.com/u/0/d/1klVgTR82laZU7aQwlfiUc2Opw9SLzn5e" class="slide">
        <img src="https://lh3.googleusercontent.com/u/0/d/1WGhmlLVxR0q1T2_0EUxNCG42jR-fTOmp" class="slide">
        <img src="https://lh3.googleusercontent.com/u/0/d/1lpTHf5bp4PrO9QHUmN63Ji9GL81ogjA4" class="slide">
        <img src="https://lh3.googleusercontent.com/u/0/d/1TZVtRFwARhYS3Q2ib5WA-jSCtNRVNvcj" class="slide">
    </div>

    <div class="banner">
        <h1>CHARLIE ANTHONY MEJIA LIGHTING DESIGN</h1>
        <nav>
            <a href="portfolio.html">PORTFOLIO</a>

    <script>
        const slides = document.querySelectorAll('.slide');
        let currentSlide = 0;
        const slideInterval = 4000; 

        function nextSlide() {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }

        setInterval(nextSlide, slideInterval);
    </script>
</body>
</html>
