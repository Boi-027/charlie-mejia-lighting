<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charlie Anthony Mejia Lighting Design</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            height: 100%;
            font-family: 'Roboto', sans-serif;
            overflow: hidden;
            background-color: #000;
        }

        /* Full-screen slideshow container */
        .slideshow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Individual slide images */
        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        .slide.active {
            opacity: 1;
        }

        /* Centered overlay banner (Now Transparent) */
        .banner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            background-color: transparent; /* Made transparent */
            padding: 20px;
            text-align: center;
            width: 100%;
        }

        .banner h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 3px;
            color: #fffde6; /* Cream color for legibility over images */
            margin-bottom: 20px;
            white-space: nowrap;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.8); /* Shadow prevents text from washing out */
        }

        .banner nav a {
            text-decoration: none;
            color: #fffde6; /* Cream color to match header */
            margin: 0 20px;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 2px;
            transition: color 0.3s;
            text-shadow: 1px 1px 5px rgba(0, 0, 0, 0.8);
        }

        .banner nav a:hover {
            color: #d6336c; /* Keeps pink hover highlight accent */
        }
    </style>
</head>
<body>

    <div class="slideshow">
        <img src="https://lh3.googleusercontent.com/u/0/d/1LbuBQ8s8c5AIdRe3EUYxDbKegM68v3tg" class="slide active">
        <img src="https://lh3.googleusercontent.com/u/0/d/1EMQwOqSrc6sX8iQpnTUipKl7gbCuMzEj" class="slide">
        <img src="https://lh3.googleusercontent.com/u/0/d/1z3_YH9Ntxpw9xTYhotKHTT5r_h7nbhoT" class="slide">
    </div>

    <div class="banner">
        <h1>CHARLIE ANTHONY MEJIA LIGHTING DESIGN</h1>
        <nav>
            <a href="portfolio.html">PORTFOLIO</a>
            <a href="about.html">ABOUT</a>
            <a href="contact.html">CONTACT</a>
        </nav>
    </div>

    <script>
        const slides = document.querySelectorAll('.slide');
        let currentSlide = 0;
        const slideInterval = 4000; 

        function nextSlide() {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }

        setInterval(nextSlide, slideInterval);
    </script>
</body>
</html>
