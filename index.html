<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charlie Anthony Mejia Lighting Design</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            height: 100%;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
            background-color: #000;
        }

        /* Full-screen slideshow container */
        .slideshow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Individual slide images */
        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        .slide.active {
            opacity: 1;
        }

        /* Centered overlay banner */
        .banner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            background-color: #fffde6; /* Cream/yellow box */
            padding: 30px 50px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 4px;
        }

        .banner h1 {
            font-size: 2.2rem;
            letter-spacing: 2px;
            color: #d6336c; 
            margin-bottom: 15px;
            white-space: nowrap;
        }

        .banner nav a {
            text-decoration: none;
            color: #333;
            margin: 0 20px;
            font-weight: bold;
            font-size: 1rem;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        .banner nav a:hover {
            color: #d6336c;
        }
    </style>
</head>
<body>

    <div class="slideshow">
        <img src="https://images.unsplash.com/photo-1516450360452-9312f5e86fc7?auto=format&fit=cover&w=1920&q=80" class="slide active">
        <img src="https://images.unsplash.com/photo-1470225620780-dba8ba36b745?auto=format&fit=cover&w=1920&q=80" class="slide">
        <img src="https://images.unsplash.com/photo-1506157786151-b8491531f063?auto=format&fit=cover&w=1920&q=80" class="slide">
    </div>

    <div class="banner">
        <h1>CHARLIE ANTHONY MEJIA LIGHTING DESIGN</h1>
        <nav>
            <a href="portfolio.html">PORTFOLIO</a>
            <a href="about.html">ABOUT</a>
            <a href="contact.html">CONTACT</a>
        </nav>
    </div>

    <script>
        const slides = document.querySelectorAll('.slide');
        let currentSlide = 0;
        const slideInterval = 4000; 

        function nextSlide() {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }

        setInterval(nextSlide, slideInterval);
    </script>
</body>
</html>
