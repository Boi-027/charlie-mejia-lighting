<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marisol - Charlie Anthony Mejia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #111;
            color: #fff;
            font-family: 'Roboto', sans-serif;
        }

        /* Top Navigation Header */
        header {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo-text {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: #fffde6;
            text-transform: uppercase;
            text-decoration: none;
        }
        nav a {
            color: #fffde6;
            text-decoration: none;
            margin-left: 20px;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 1px;
            transition: color 0.3s;
        }
        nav a:hover { color: #d6336c; }

        /* Big Widescreen Show Banner at Top */
        .show-hero {
            width: 100%;
            height: 400px; 
            position: relative;
            overflow: hidden;
        }
        .show-hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center center;
        }
        .show-hero .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, #111 0%, rgba(17,17,17,0.4) 70%, rgba(0,0,0,0.2) 100%);
        }

        /* Main Content Section */
        .content-container {
            max-width: 1200px;
            margin: -50px auto 100px auto; 
            padding: 0 20px;
            position: relative;
            z-index: 2;
        }
        .back-link {
            display: inline-block;
            color: #d6336c;
            text-decoration: none;
            font-weight: 700;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
        }
        .back-link:hover { text-decoration: underline; }

        h1 {
            font-size: 3rem;
            color: #fffde6;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 5px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.7);
        }
        .company-sub {
            font-size: 1.3rem;
            color: #ccc;
            margin-bottom: 40px;
        }

        /* Production Gallery Layout */
        .gallery-section {
            margin-top: 40px;
        }
        .gallery-section h3 {
            color: #fffde6;
            font-size: 1.5rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        .gallery-item {
            position: relative;
            height: 240px;
            overflow: hidden;
            border-radius: 6px;
            border: 1px solid rgba(255, 253, 230, 0.05);
            background-color: #1a1a1a;
            cursor: zoom-in; /* Indicates the picture can be clicked to enlarge */
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s;
        }
        .gallery-item:hover img {
            transform: scale(1.03);
        }

        /* Fullscreen Lightbox Overlay Component */
        .lightbox-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            cursor: zoom-out;
        }
        /* Reveal the window overlay smoothly */
        .lightbox-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        /* Dynamic container image limits */
        .lightbox-overlay img {
            max-width: 90%;
            max-height: 85%;
            object-fit: contain;
            border-radius: 4px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
            transform: scale(0.95);
            transition: transform 0.3s ease;
        }
        .lightbox-overlay.active img {
            transform: scale(1);
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo-text">Charlie Anthony Mejia</a>
        <nav>
            <a href="portfolio.html">Portfolio</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <div class="show-hero">
        <img src="marisol/marisol%20(1).JPG" alt="Marisol Hero">
        <div class="overlay"></div>
    </div>

    <div class="content-container">
        <a href="portfolio.html" class="back-link">← Back to Portfolio</a>
        
        <h1>Marisol</h1>
        <p class="company-sub">San Francisco State University</p>

        <div class="gallery-section">
            <h3>Production Gallery</h3>
            <div class="image-grid" id="production-gallery">
            </div>
        </div>
    </div>

    <div class="lightbox-overlay" id="lightbox" onclick="closeLightbox()">
        <img id="lightbox-img" src="" alt="Enlarged View">
    </div>

    <script>
        const galleryContainer = document.getElementById('production-gallery');
        const totalImages = 9; 

        // Automatically loops from marisol (1).JPG up to marisol (9).JPG
        for (let i = 1; i <= totalImages; i++) {
            const rawFilename = `marisol (${i}).JPG`;
            const safePath = `marisol/${encodeURIComponent(rawFilename)}`;

            const item = document.createElement('div');
            item.className = 'gallery-item';
            item.innerHTML = `<img src="${safePath}" alt="Marisol Shot ${i}" loading="lazy">`;
            
            galleryContainer.appendChild(item);
        }

        // --- LIGHTBOX INTERACTIVE COMPONENT CLICK LOGIC ---
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');

        // Capture user image selections down in the layout grid dynamically
        document.getElementById('production-gallery').addEventListener('click', function(e) {
            const clickedImg = e.target.closest('img');
            
            if (clickedImg) {
                lightboxImg.src = clickedImg.src;
                lightboxImg.alt = clickedImg.alt;
                lightbox.classList.add('active');
            }
        });

        // Safe closure routine clears image buffer values to avoid layout flashes
        function closeLightbox() {
            lightbox.classList.remove('active');
            setTimeout(() => { lightboxImg.src = ""; }, 300);
        }
    </script>

</body>
</html>
