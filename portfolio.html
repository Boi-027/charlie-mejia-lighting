<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Charlie Anthony Mejia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* Base page reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #111;
            color: #fff;
            font-family: 'Roboto', sans-serif;
            padding: 40px 20px;
        }

        /* Top Navigation Header */
        header {
            max-width: 1200px;
            margin: 0 auto 40px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo-text {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: #fffde6;
            text-transform: uppercase;
        }
        nav a {
            color: #fffde6;
            text-decoration: none;
            margin-left: 20px;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 1px;
            transition: color 0.3s;
        }
        nav a:hover { 
            color: #d6336c; 
        }

        /* Page Title */
        h1.page-title {
            max-width: 1200px;
            margin: 0 auto 30px auto;
            color: #fffde6;
            font-size: 2rem;
            letter-spacing: 1px;
            font-weight: 700;
        }

        /* Up and Down Layout Container */
        .portfolio-list {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column; /* Stacks items vertically */
            gap: 24px; /* Vertical gap between rows */
        }

        /* Individual Widescreen Banner Rows */
        .portfolio-banner {
            position: relative;
            width: 100%;
            height: 350px; /* Adjust row height here */
            overflow: hidden;
            border-radius: 6px;
            cursor: pointer;
            display: block;
            text-decoration: none;
        }

        /* Images stretch completely across the banner */
        .portfolio-banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Smooth dark overlay gradient to make text pop over variable lighting images */
        .portfolio-banner .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.3) 60%, rgba(0,0,0,0) 100%);
            transition: background 0.3s;
        }

        /* Bottom-left text alignment styling */
        .portfolio-banner .project-info {
            position: absolute;
            bottom: 35px;
            left: 40px;
            z-index: 2;
        }

        .portfolio-banner h2 {
            font-size: 2rem;
            color: #fffde6;
            letter-spacing: 1px;
            margin-bottom: 5px;
            text-transform: uppercase;
            font-weight: 700;
            text-shadow: 1px 1px 10px rgba(0,0,0,0.5);
        }

        .portfolio-banner p {
            font-size: 1rem;
            color: #ccc;
            letter-spacing: 0.5px;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.5);
        }

        /* Interaction Effects */
        .portfolio-banner:hover img {
            transform: scale(1.02); /* Slight immersive zoom */
        }
        
        .portfolio-banner:hover .overlay {
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.4) 60%, rgba(0,0,0,0.1) 100%);
        }

        /* Adjusts banner sizes gracefully on mobile devices */
        @media (max-width: 768px) {
            .portfolio-banner {
                height: 220px;
            }
            .portfolio-banner .project-info {
                left: 20px;
                bottom: 20px;
            }
            .portfolio-banner h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
