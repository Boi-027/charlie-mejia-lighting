<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Charlie Anthony Mejia</title>
    <style>
        /* Base page styling */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #111;
            color: #fff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            padding: 40px 20px;
        }

        /* Top Navigation Header */
        header {
            max-width: 1200px;
            margin: 0 auto 40px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo-text {
            font-size: 1.1rem;
            font-weight: bold;
            letter-spacing: 1px;
            color: #fffde6;
            text-transform: uppercase;
        }
        nav a {
            color: #fffde6;
            text-decoration: none;
            margin-left: 20px;
            font-weight: bold;
            font-size: 0.9rem;
            letter-spacing: 1px;
            transition: color 0.3s;
        }
        nav a:hover { 
            color: #d6336c; 
        }

        /* Page Title */
        h1.page-title {
            max-width: 1200px;
            margin: 0 auto 30px auto;
            color: #fffde6;
            font-size: 2rem;
            letter-spacing: 1px;
        }

        /* Banner List Container */
        .portfolio-list {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 24px; /* Space between the rows */
        }

        /* Individual Banner Item */
        .portfolio-banner {
            position: relative;
            width: 100%;
            height: 300px; /* Adjust height of the rows here */
            overflow: hidden;
            border-radius: 6px;
            cursor: pointer;
            display: block;
            text-decoration: none;
        }

        /* The Background Image inside the banner */
        .portfolio-banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Dark overlay gradient to make text legible */
        .portfolio-banner .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.2) 60%, rgba(0,0,0,0) 100%);
            transition: background 0.3s;
        }

        /* Text overlay container */
        .portfolio-banner .project-info {
            position: absolute;
            bottom: 30px;
            left: 40px;
            z-index: 2;
        }

        .portfolio-banner h2 {
            font-size: 1.8rem;
            color: #fffde6;
            letter-spacing: 1px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .portfolio-banner p {
            font-size: 1rem;
            color: #ccc;
            letter-spacing: 0.5px;
        }

        /* Hover Interactions */
        .portfolio-banner:hover img {
            transform: scale(1.03); /* Soft zoom effect */
        }
        
        .portfolio-banner:hover .overlay {
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 60%, rgba(0,0,0,0.1) 100%);
        }

        /* Responsive design for smaller screens */
        @media (max-width: 768px) {
            .portfolio-banner {
                height: 200px;
            }
            .portfolio-banner .project-info {
                left: 20px;
                bottom: 20px;
            }
            .portfolio-banner h2 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-text">Charlie Anthony Mejia</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>
    
    <h1 class="page-title">Portfolio</h1>

    <div class="portfolio-list">

        <a href="#" class="portfolio-banner">
            <img src="https://images.unsplash.com/photo-1516450360452-9312f5e86fc7?auto=format&fit=cover&w=1200&q=80" alt="Arcadia Project">
            <div class="overlay"></div>
            <div class="project-info">
                <h2>Arcadia</h2>
                <p>Theatrical Production — 2026</p>
            </div>
        </a>

        <a href="#" class="portfolio-banner">
            <img src="https://images.unsplash.com/photo-1470225620780-dba8ba36b745?auto=format&fit=cover&w=1200&q=80" alt="Live Concert Project">
            <div class="overlay"></div>
            <div class="project-info">
                <h2>Live Concert Lighting</h2>
                <p>Arena Showcase</p>
            </div>
        </a>

        <a href="#" class="portfolio-banner">
            <img src="https://images.unsplash.com/photo-1506157786151-b8491531f063?auto=format&fit=cover&w=1200&q=80" alt="Opera Project">
            <div class="overlay"></div>
            <div class="project-info">
                <h2>The Opera</h2>
                <p>Main Stage Production</p>
            </div>
        </a>

    </div>

</body>
</html>
