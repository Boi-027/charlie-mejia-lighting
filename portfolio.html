<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Charlie Anthony Mejia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* Base page reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #111;
            color: #fff;
            font-family: 'Roboto', sans-serif;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top Navigation Header */
        header {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto 30px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .logo-text {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: #fffde6;
            text-transform: uppercase;
        }
        nav a {
            color: #fffde6;
            text-decoration: none;
            margin-left: 20px;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 1px;
            transition: color 0.3s;
        }
        nav a:hover { 
            color: #d6336c; 
        }

        /* Page Title */
        h1.page-title {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto 20px auto;
            color: #fffde6;
            font-size: 2rem;
            letter-spacing: 1px;
            font-weight: 700;
            flex-shrink: 0;
        }

        /* Horizontal Scroll Container (Left to Right) */
        .portfolio-scroll-container {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            flex-direction: row; /* Forces items side-by-side */
            gap: 20px;
            overflow-x: auto; /* Adds the horizontal scrollbar when items overflow */
            overflow-y: hidden;
            padding-bottom: 25px; /* Space for the scrollbar aesthetic */
            flex-grow: 1;
            scroll-behavior: smooth;
        }

        /* Custom Scrollbar Styling to keep it looking clean */
        .portfolio-scroll-container::-webkit-scrollbar {
            height: 8px;
        }
        .portfolio-scroll-container::-webkit-scrollbar-track {
            background: #222;
            border-radius: 4px;
        }
        .portfolio-scroll-container::-webkit-scrollbar-thumb {
            background: #d6336c;
            border-radius: 4px;
        }

        /* Tall, Vertical Standee Banner Item */
        .portfolio-banner {
            position: relative;
            flex: 0 0 320px; /* Fixed width of 320px per banner, won't shrink */
            height: 550px; /* Tall aspect ratio mimicking your rollup banner upload */
            overflow: hidden;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            display: block;
        }

        /* Portrait-oriented backgrounds */
        .portfolio-banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Heavy dark vignette overlay bottom-to-top for typography readability */
        .portfolio-banner .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 50%, rgba(0,0,0,0) 100%);
            transition: background 0.3s;
        }

        /* Text positioning at the base of the vertical column */
        .portfolio-banner .project-info {
            position: absolute;
            bottom: 30px;
            left: 25px;
            right: 25px;
            z-index: 2;
        }

        .portfolio-banner h2 {
            font-size: 1.6rem;
            color: #fffde6;
            letter-spacing: 1px;
            margin-bottom: 6px;
            text-transform: uppercase;
            font-weight: 700;
            text-shadow: 1px 1px 8px rgba(0,0,0,0.6);
        }

        .portfolio-banner p {
            font-size: 0.95rem;
            color: #ccc;
            letter-spacing: 0.5px;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.5);
        }

        /* Zoom and shadow transition interactions */
        .portfolio-banner:hover img {
            transform: scale(1.04);
        }
        
        .portfolio-banner:hover .overlay {
            background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.5) 50%, rgba(0,0,0,0.1) 100%);
        }

        /* Mobile adaptation - scales down banner aspect boxes gracefully */
        @media (max-width: 480px) {
            .portfolio-banner {
                flex: 0 0 260px;
                height: 440px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-text">Charlie Anthony Mejia</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>
    
    <h1 class="page-title">Portfolio</h1>

    <div class="portfolio-scroll-container">

        <a href="#" class="portfolio-banner">
            <img src="https://lh3.googleusercontent.com/u/0/d/1z3_YH9Ntxpw9xTYhotKHTT5r_h7nbhoT9" alt="Project 1">
            <div class="overlay"></div>
            <div class="project-info">
                <h2>Project One</h2>
                <p>Lighting Design Production</p>
            </div>
        </a>

        <a href="#" class="portfolio-banner">
            <img src="https://lh3.googleusercontent.com/u/0/d/0" alt="Project 2">
            <div class="overlay"></div>
            <div class="project-info">
                <h2>Project Two</h2>
                <p>Stage & Scenic Showcase</p>
            </div>
        </a>

        <a href="#" class="portfolio-banner">
            <img src="https://lh3.googleusercontent.com/u/0/d/1" alt="Project 3">
            <div class="overlay"></div>
            <div class="project-info">
                <h2>Project Three</h2>
                <p>Theatrical Production</p>
            </div>
        </a>

        <a href="#" class="portfolio-banner">
            <img src="https://lh3.googleusercontent.com/u/0/d/2" alt="Project 4">
            <div class="overlay"></div>
            <div class="project-info">
                <h2>Project Four</h2>
                <p>Live Concert Lighting</p>
            </div>
        </a>

        <a href="#" class="portfolio-banner">
            <img src="https://lh3.googleusercontent.com/u/0/d/3" alt="Project 5">
            <div class="overlay"></div>
            <div class="project-info">
                <h2>Project Five</h2>
                <p>Arena Exhibition</p>
            </div>
        </a>

    </div>

</body>
</html>
